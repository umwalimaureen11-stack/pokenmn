<!DOCTYPE html>
<html lang="en" class="transition-colors duration-500">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Finder</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="min-h-screen flex items-center justify-center 
  bg-gradient-to-br from-indigo-400 via-purple-400 to-pink-400
  dark:from-gray-900 dark:via-gray-800 dark:to-gray-900
  px-4 sm:px-6 lg:px-8 transition-all duration-500">

  <div class="w-full max-w-sm sm:max-w-md md:max-w-lg lg:max-w-xl">

    <!-- Dark Mode Toggle -->
    <div class="flex justify-end mb-4">
      <button id="toggleDark"
        class="px-3 py-1 text-sm sm:text-base bg-gray-800 text-white rounded-lg hover:bg-gray-700 transition">
        🌙 Toggle Dark
      </button>
    </div>
